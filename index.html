<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>kame | profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══ THEMES ══ */
:root{
  --c1:#00d4ff;--c2:#0099cc;--c3:#ff6b2b;
  --glow:rgba(0,212,255,0.55);--glow2:rgba(0,212,255,0.15);
  --dark:#050a0f;--steel:#0f1d2a;--text:#c8d8e8;
}
body.theme-red{
  --c1:#ff2244;--c2:#cc1133;--c3:#ff8800;
  --glow:rgba(255,34,68,0.6);--glow2:rgba(255,34,68,0.15);
}
body.theme-blue{
  --c1:#00d4ff;--c2:#0099cc;--c3:#ff6b2b;
  --glow:rgba(0,212,255,0.55);--glow2:rgba(0,212,255,0.15);
}
body.theme-neon{
  --c1:#39ff14;--c2:#00ff88;--c3:#ff00ff;
  --glow:rgba(57,255,20,0.6);--glow2:rgba(57,255,20,0.15);
}

html,body{height:100%;overflow-x:hidden}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;background:var(--dark);padding:20px;
  position:relative;transition:--c1 .4s,--c2 .4s,--glow .4s;
}

#bgCanvas{position:fixed;inset:0;z-index:0;display:block}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 4px)}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.85) 100%)}

  /* ══ CLICK RIPPLE ══ */
.ripple{
  position:fixed;pointer-events:none;z-index:9999;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--c1);
  transform:translate(-50%,-50%) scale(0);
  animation:rippleAnim .5s ease-out forwards;
}
@keyframes rippleAnim{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(-50%,-50%) scale(8);opacity:0}
}

/* ══ CARD ══ */
.card{
  position:relative;z-index:10;width:100%;max-width:410px;
  background:linear-gradient(145deg,rgba(5,12,20,.94),rgba(3,8,14,.97));
  border:1px solid rgba(var(--c1-raw,0,212,255),.22);
  border-color:color-mix(in srgb,var(--c1) 30%,transparent);
  border-radius:6px;overflow:hidden;
  box-shadow:0 0 0 1px var(--glow2),0 0 50px var(--glow2),0 24px 80px rgba(0,0,0,.9),inset 0 1px 0 var(--glow2);
  animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
  transition:box-shadow .4s,border-color .4s;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}

.card-top-bar{
  height:3px;
  background:linear-gradient(90deg,var(--c3),var(--c1),var(--c3));
  background-size:200%;animation:barSlide 3s linear infinite;
}
@keyframes barSlide{to{background-position:200% 0}}

.corner{position:absolute;width:18px;height:18px;z-index:20}
.corner-tl{top:3px;left:0;border-top:2px solid var(--c1);border-left:2px solid var(--c1)}
.corner-tr{top:3px;right:0;border-top:2px solid var(--c1);border-right:2px solid var(--c1)}
.corner-bl{bottom:0;left:0;border-bottom:2px solid var(--c3);border-left:2px solid var(--c3)}
.corner-br{bottom:0;right:0;border-bottom:2px solid var(--c3);border-right:2px solid var(--c3)}

.card-inner{padding:24px 22px 24px}

  /* ══ TOP TOOLBAR ══ */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;gap:8px;
}

/* Theme switcher */
.theme-btns{display:flex;gap:6px}
.theme-dot{
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .2s;
  position:relative;
}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.active{border-color:#fff;box-shadow:0 0 8px currentColor}
.theme-dot.td-red{background:#ff2244}
.theme-dot.td-blue{background:#00d4ff}
.theme-dot.td-neon{background:#39ff14}

/* Volume */
.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-icon{font-size:14px;cursor:pointer;color:var(--c1);transition:color .3s}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  width:70px;height:3px;border-radius:2px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,var(--c1) var(--pct,60%),rgba(255,255,255,.12) var(--pct,60%));
  transition:background .1s;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--c1);box-shadow:0 0 6px var(--glow);cursor:pointer;
}

  /* Music btn */
.music-btn{
  width:30px;height:30px;border-radius:3px;
  background:rgba(255,255,255,.04);border:1px solid color-mix(in srgb,var(--c1) 40%,transparent);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;flex-shrink:0;
}
.music-btn:hover{background:var(--glow2);box-shadow:0 0 12px var(--glow)}
.music-btn svg{width:15px;height:15px;fill:var(--c1);transition:fill .4s}
.eq-bars{display:none;gap:2px;align-items:flex-end;height:13px}
.eq-bars span{display:block;width:3px;background:var(--c1);border-radius:1px;animation:eq var(--s,.6s) ease-in-out infinite alternate;transition:background .4s}
.eq-bars span:nth-child(1){height:5px;--s:.5s}
.eq-bars span:nth-child(2){height:11px;--s:.7s;animation-delay:.1s}
.eq-bars span:nth-child(3){height:7px;--s:.4s;animation-delay:.2s}
.eq-bars span:nth-child(4){height:13px;--s:.6s;animation-delay:.05s}
@keyframes eq{to{height:3px}}
.music-btn.playing .eq-bars{display:flex}
.music-btn.playing .music-icon{display:none}

/* ══ CLOCK ══ */
.clock-wrap{
  text-align:center;margin-bottom:18px;
  font-family:'Orbitron',monospace;
  animation:fadeUp .5s .2s both;
}
.clock-time{
  font-size:28px;font-weight:900;
  color:#fff;letter-spacing:4px;
  text-shadow:0 0 20px var(--glow),0 0 40px var(--glow2);
  transition:text-shadow .4s;
}
.clock-time .colon{animation:blinkColon 1s step-end infinite;color:var(--c1)}
@keyframes blinkColon{0%,100%{opacity:1}50%{opacity:0}}
.clock-date{
  font-size:10px;color:rgba(200,216,232,.4);letter-spacing:3px;
  text-transform:uppercase;margin-top:4px;
}

  /* ══ HEADER ══ */
.header{display:flex;align-items:center;gap:18px;margin-bottom:22px;animation:fadeUp .6s .3s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.avatar-wrap{position:relative;flex-shrink:0;width:88px;height:88px}
.avatar-wrap img{
  width:100%;height:100%;object-fit:cover;border-radius:4px;
  display:block;filter:grayscale(15%) contrast(1.1);
}
.avatar-border{
  position:absolute;inset:-3px;border:1.5px solid var(--c1);border-radius:5px;
  box-shadow:0 0 14px var(--glow),inset 0 0 10px var(--glow2);
  animation:borderPulse 2s ease-in-out infinite;transition:border-color .4s,box-shadow .4s;
}
@keyframes borderPulse{
  0%,100%{box-shadow:0 0 14px var(--glow),inset 0 0 10px var(--glow2)}
  50%{box-shadow:0 0 30px var(--glow),0 0 50px var(--glow2),inset 0 0 14px var(--glow2)}
}
.avatar-border::before{content:'';position:absolute;top:-2px;right:8px;width:24px;height:2px;background:var(--c3);transition:background .4s}

/* Discord status badge on avatar */
.discord-badge{
  position:absolute;bottom:-6px;right:-6px;z-index:5;
  background:var(--dark);border:2px solid var(--dark);
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
}
.discord-status-dot{
  width:14px;height:14px;border-radius:50%;
  background:#747f8d;
  transition:background .5s,box-shadow .5s;
}
.discord-status-dot.online{background:#23d18b;box-shadow:0 0 8px #23d18b}
.discord-status-dot.idle{background:#faa61a;box-shadow:0 0 8px #faa61a}
.discord-status-dot.dnd{background:#f04747;box-shadow:0 0 8px #f04747}
.discord-status-dot.offline{background:#747f8d}

.name-block{flex:1;min-width:0}
.username{
  font-family:'Orbitron',monospace;font-weight:900;font-size:24px;
  color:#fff;letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:5px;
  text-shadow:0 0 20px var(--glow);transition:text-shadow .4s;
  animation:glitch 6s infinite;
}
.username span{color:var(--c1);transition:color .4s}
@keyframes glitch{
  0%,90%,100%{transform:none;filter:none}
  91%{transform:skewX(-3deg);filter:drop-shadow(-2px 0 var(--c3)) drop-shadow(2px 0 var(--c1))}
  92%{transform:skewX(2deg)}93%{transform:none}
}
.tagline{font-size:11px;color:rgba(200,216,232,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* Discord status text under tagline */
.discord-status-text{
  font-size:11px;color:rgba(200,216,232,.5);margin-bottom:8px;
  display:flex;align-items:center;gap:5px;
}
.ds-dot-inline{width:7px;height:7px;border-radius:50%;background:#747f8d;flex-shrink:0;transition:background .5s}
.ds-dot-inline.online{background:#23d18b}
.ds-dot-inline.idle{background:#faa61a}
.ds-dot-inline.dnd{background:#f04747}

.level-label{font-size:10px;color:var(--c3);letter-spacing:1px;margin-bottom:4px;font-family:'Orbitron',monospace;transition:color .4s}
.level-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.level-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--c3),var(--c1));
  border-radius:2px;box-shadow:0 0 8px var(--glow);
  animation:fillAnim 1.8s ease-out .8s forwards;transition:background .4s,box-shadow .4s;
}
@keyframes fillAnim{to{width:72%}}

  /* ══ DIVIDER ══ */
.divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;animation:fadeUp .6s .5s both}
.divider-line{flex:1;height:1px;background:color-mix(in srgb,var(--c1) 20%,transparent);transition:background .4s}
.divider-icon{font-size:9px;color:color-mix(in srgb,var(--c1) 50%,transparent);letter-spacing:2px;font-family:'Orbitron',monospace;transition:color .4s}

/* ══ SOCIALS ══ */
.socials{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px;animation:fadeUp .6s .6s both}
.social-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:10px 0;
  background:rgba(255,255,255,.03);
  border:1px solid color-mix(in srgb,var(--c1) 15%,transparent);
  border-radius:4px;text-decoration:none;color:var(--text);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  transition:all .2s;position:relative;overflow:hidden;cursor:pointer;
}
.social-btn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--c1);transform:scaleX(0);transition:transform .2s,background .4s;
}
.social-btn:hover{
  background:color-mix(in srgb,var(--c1) 8%,transparent);
  border-color:color-mix(in srgb,var(--c1) 45%,transparent);
  color:#fff;transform:translateY(-3px);
  box-shadow:0 6px 20px var(--glow2),0 0 12px var(--glow2);
}
.social-btn:hover::after{transform:scaleX(1)}
.social-btn:active{transform:scale(.93) translateY(0);box-shadow:0 0 20px var(--glow)}
.social-btn svg{width:18px;height:18px;transition:filter .2s}
.social-btn:hover svg{filter:drop-shadow(0 0 4px var(--c1))}

/* ══ STATUS ══ */
.status-card{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-left:3px solid var(--c3);border-radius:4px;padding:11px 12px;margin-bottom:18px;
  animation:fadeUp .6s .7s both;transition:border-color .4s;
}
.status-avatar{
  width:40px;height:40px;background:var(--steel);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;
}
.status-dot{
  position:absolute;bottom:-3px;right:-3px;width:10px;height:10px;border-radius:50%;
  background:#faa61a;border:2px solid var(--dark);
  animation:dotPulse 1.8s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 6px #faa61a}
  50%{box-shadow:0 0 16px #faa61a,0 0 28px rgba(250,166,26,.35)}
}
.status-name{font-family:'Orbitron',monospace;font-size:10px;color:#fff;letter-spacing:1px;margin-bottom:3px}
.status-text{font-size:11px;color:rgba(200,216,232,.4)}

/* ══ STATS ══ */
.stats{
  display:flex;
  border:1px solid color-mix(in srgb,var(--c1) 12%,transparent);
  border-radius:4px;overflow:hidden;animation:fadeUp .6s .8s both;
  transition:border-color .4s;
}
.stat{flex:1;padding:10px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid color-mix(in srgb,var(--c1) 12%,transparent);transition:border-color .4s}
.stat:last-child{border-right:none}
.stat-val{font-family:'Orbitron',monospace;font-size:13px;color:var(--c1);font-weight:700;transition:color .4s}
.stat-label{font-size:9px;color:rgba(200,216,232,.35);letter-spacing:1px;text-transform:uppercase}

/* ══ PARTICLES ══ */
.particles{position:fixed;inset:0;z-index:2;pointer-events:none}
.particle{position:absolute;border-radius:50%;animation:floatUp var(--d,8s) linear infinite var(--dl,0s);opacity:0}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) translateX(0)}
  10%{opacity:.8}90%{opacity:.3}
  100%{opacity:0;transform:translateY(-95vh) translateX(var(--dx,0px))}
}
</style>
</head>
